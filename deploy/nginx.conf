server {
    listen 80;
    listen [::]:80;
    server_name scan.thuoc360.com;

    root /var/www/scan/web;
    index index.php;

    charset utf-8;
    client_max_body_size 20M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        try_files $uri $uri/ @scan;
    }

    location @scan {
        rewrite ^/store/([a-zA-Z0-9._-]+)/?$ /store.php?slug=$1 last;
        rewrite ^/blog/([a-zA-Z0-9._-]+)/?$ /blog-post.php?slug=$1 last;
        rewrite ^/deals/?$ /deals.php last;
        rewrite ^/blog/?$ /blog.php last;
        rewrite ^/stores/?$ /stores.php last;
        rewrite ^/search/?$ /search.php last;
        rewrite ^/api/?$ /api/index.php last;
        rewrite ^/api/coupons/import/?$ /api/import-coupons.php last;
        rewrite ^/api/coupons/?$ /api/coupons.php last;
        rewrite ^/api/search/?$ /api/search.php last;
        rewrite ^/api/store/([a-zA-Z0-9._-]+)/?$ /api/store.php?slug=$1 last;
        rewrite ^/$ /index.php last;
        rewrite ^ /404.php last;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.5-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* ^/(db|config|crawler|jobs|storage/raw)/ {
        deny all;
    }
}

