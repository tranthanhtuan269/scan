# VirtualHost mẫu cho scan.test
# Copy vào: C:\xampp\apache\conf\extra\httpd-vhosts.conf
# Thêm vào C:\Windows\System32\drivers\etc\hosts:
#   127.0.0.1   scan.test
# Restart Apache sau khi sửa.

<VirtualHost *:80>
    DocumentRoot "C:/xampp/htdocs/scan/web"
    ServerName scan.test

    <Directory "C:/xampp/htdocs/scan/web">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog "logs/scan.test-error.log"
    CustomLog "logs/scan.test-access.log" common
</VirtualHost>

# Truy cập: http://scan.test/
# BASE_PATH tự detect = "" (root site)
# Không dùng http://localhost/scan/web/ khi đã cấu hình vhost này
